apiVersion: apps/v1
kind: Deployment
metadata:
  name: theseus-portal
spec:
  replicas: {{ .Values.portal.replicas }}
  selector:
    matchLabels:
      app: theseus-portal
  template:
    metadata:
      labels:
        app: theseus-portal
    spec:
      containers:
        - name: portal
          image: {{ .Values.portal.image }}
          ports:
            - containerPort: {{ .Values.portal.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: theseus-secrets
                  key: database_url
                  optional: true
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: theseus-secrets
                  key: session_secret
                  optional: true
