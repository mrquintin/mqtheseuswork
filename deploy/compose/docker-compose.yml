# Local stack: Postgres + Redis + MinIO (S3-compatible) for cloud-shaped dev.
# Usage: docker compose -f deploy/compose/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: theseus
      POSTGRES_PASSWORD: theseus
      POSTGRES_DB: theseus
    ports:
      - "5432:5432"
    volumes:
      - theseus_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: theseus
      MINIO_ROOT_PASSWORD: theseussecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - theseus_minio:/data

volumes:
  theseus_pg:
  theseus_minio:
