  - .github/workflows/redteam_tournament.yml

# Always strip these as glob patterns regardless of where they appear.
exclude_globs:
  - "**/.DS_Store"
  - "**/__pycache__/"
  - "**/*.pyc"
  - "**/.next/"
  - "**/dist/"
  - "**/build/"
  - "**/*.egg-info/"
  - "**/node_modules/"
  - "**/*.aux"
  - "**/*.log"
  - "**/*.out"
  - "**/*.toc"
  - "**/.pytest_cache/"
  - "**/.ruff_cache/"
  - "**/playwright-report/"
  - "**/test-results/"
  - "**/coverage/"
  - "**/.venv/"
  - "**/.vercel/"

# Files the extractor sources from `theseus-template/` in the source
# repo and writes into the output (after CORE/CONFIG/SEED have been
# emitted, so they overwrite any same-named CORE files).
payload:
  - theseus-template/README.md
  - theseus-template/scripts/bootstrap.sh
  - theseus-template/.github/workflows/template_ci.yml

# Output configuration
output:
  default_dir: "../theseus-template"
  initial_commit_message: "Initial commit (extracted from Theseus platform)"
  initial_commit_author_name: "Theseus Template Builder"
  initial_commit_author_email: "template@theseus.invalid"
