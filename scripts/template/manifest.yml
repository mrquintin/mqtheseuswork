  - docs/Noosphere_Project_Status.pdf
  - docs/Podcast_Infrastructure_Research.pdf
  - docs/Product_And_Software_Summary.pdf
  - docs/Product_And_Software_Summary.tex
  - docs/Product_Description.pdf
  - docs/Reader_Guide.pdf
  - docs/Reader_Guide.tex
  - docs/redteam/
  - docs/research/
  - docs/runs/
