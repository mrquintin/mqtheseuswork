# Theseus template extraction manifest.
#
# Used by `scripts/build_template.sh` to build a tenant-installable
# copy of Theseus. Each section names paths or tokens with one of
# four classifications:
#
#   include_core       — copied verbatim
#   include_config     — copied with token substitution
#   include_seed       — replaced with an empty-shape stub
#   exclude_firm       — never copied
#
# Classifications match `docs/template/INVENTORY.md`. When a new
# top-level path is added to the source repo, add it here too —
# the extractor refuses to copy anything not declared.
#
# Paths are interpreted relative to the source-repo root. Trailing
# `/` denotes a directory (match recursively). Glob patterns use
# shell-style globs.

version: 1

# ──────────────────────────────────────────────────────────────────
# CORE — verbatim copy
# ──────────────────────────────────────────────────────────────────
include_core:
  - .editorconfig
  - .gitignore
  - Makefile
  - Dockerfile.api
  - Dockerfile.scheduler
  - requirements.txt
  - format_stream_claude.py
  - format_stream_events.py
  - THE_META_METHOD.md
  - current_events_api/
  - deploy/
  - dialectic/
  - docs/api-methods/
  - docs/architecture/
  - docs/Auto_Processing_Setup.md
  - docs/CI_CD_Setup.tex
  - docs/CI_CD_Setup.pdf
  - docs/currents/
  - docs/design/
  - docs/Desktop_Packaging.tex
  - docs/Desktop_Packaging.pdf
  - docs/Docker_Deployment.tex
  - docs/Docker_Deployment.pdf
  - docs/eval/
  - docs/guides/
  - docs/interop/
  - docs/methods/
  - docs/operations/
  - docs/Operations_Manual.md
  - docs/operator/
  - docs/peer_review/
  - docs/perf/
  - docs/Performance_Synthesis.md
  - docs/Server_Architecture.pdf
  - docs/The_Meta_Method.pdf
  - docs/Theseus_Codex_User_Guide.tex
  - docs/Theseus_Codex_User_Guide.pdf
  - docs/Transcript_Extraction_Research.pdf
  - noosphere/
  - ops/
  - packages/
  - replication/
  - researcher_api/
  - scripts/
  - tests/
  - theseus-codex/
  - theseus-public/

# ──────────────────────────────────────────────────────────────────
# CONFIG — copied with token substitution
# ──────────────────────────────────────────────────────────────────
include_config:
  - .env.live.template
  - config/defaults.yaml
  - config/development.yaml
  - config/production.yaml
  - docker-compose.dev.yml
  - docker-compose.yml
  - docs/security/Threat_Model.md
  - pyproject.toml
  # README is fully overwritten with the template payload; we keep
  # the token pass for files inside subdirectories that may carry
  # the firm name in headers.

# Tokens applied to every CONFIG file (and to certain CORE files
# where a stray reference may exist — the extractor will also pass
# CORE files through a non-destructive replace for the tokens
# listed here, so we don't have to enumerate every README).
tokens:
  THESEUS_ORG_NAME:
    description: Display name of the operating firm.
    source_value: "Theseus"
    template_value: "<your firm name>"
  THESEUS_ORG_SLUG:
    description: URL-safe slug for the operating firm.
    source_value: "theseus-local"
    template_value: "<your-firm-slug>"
  THESEUS_DEFAULT_LLM:
    description: Default LLM model id. Bootstrap may override.
    source_value: "haiku-4-5"
    template_value: "haiku-4-5"
  THESEUS_NOTIFY_FROM_DEFAULT:
    description: Default sender for notification email.
    source_value: "notify@theseus.local"
    template_value: "notify@example.invalid"
  THESEUS_PUBLIC_BASE_URL:
    description: Public site origin.
    source_value: "https://theseus.local"
    template_value: "https://your-firm.example"
  THESEUS_FOUNDER_DISPLAY_NAME:
    description: Substituted anywhere a founder's name appears.
    source_value: "Michael Quintin"
    template_value: "<founder name>"

# Firm-attribution phrases that must be scrubbed wholesale from any
# CONFIG / CORE file that slips them through. The extractor refuses
# to emit a file that still contains any of these after token
# substitution.
forbidden_phrases:
  - "Quintin Hypothesis"
  - "Michael Quintin"
  - "FOUNDER_ALPHA_EMAIL=qmichael444@gmail.com"

# ──────────────────────────────────────────────────────────────────
# SEED — empty-shape stubs
# ──────────────────────────────────────────────────────────────────
include_seed:
  - noosphere_data/
  - noosphere/noosphere_data/
  - replication/runs/
  - theseus-public/content/
  # `theseus-codex/prisma/seed.ts` ships unchanged but the bootstrap
  # wizard invokes it WITHOUT `SEED_WITH_MOCK_DATA=1`, so the new
  # tenant starts with zero conclusions / zero principles.

seed_stubs:
  noosphere_data/noosphere_config.json: |
    {
      "tenant_slug": "<your-firm-slug>",
      "tenant_name": "<your firm name>",
      "default_model": "haiku-4-5",
      "currents_enabled": true,
      "forecasts_enabled": false,
      "equities_enabled": false
    }
  noosphere_data/README.md: |
    # Runtime data

    This directory holds the per-tenant runtime ledger. It is
    populated as the platform runs; do not pre-fill it.
  theseus-public/content/README.md: |
    # Published content

    Articles approved for public surfacing land here. Start empty.

# ──────────────────────────────────────────────────────────────────
# FIRM — never copied
# ──────────────────────────────────────────────────────────────────
