appId: com.theseus.founder-portal
productName: "Theseus Founder Portal"
copyright: "Copyright © 2026 Theseus"

directories:
  output: dist-electron
  buildResources: assets

files:
  - dist-desktop/**/*
  - .next/standalone/**/*
  - .next/static/**/*
  - public/**/*
  - prisma/**/*
  - node_modules/.prisma/**/*
  - node_modules/@prisma/**/*
  - node_modules/better-sqlite3/**/*
  - package.json

# extraResources previously bundled a dev seed.db; disabled since that file
# isn't committed to the repo. Re-enable and commit the file if needed.
# extraResources:
#   - from: data/seed.db
#     to: seed.db

mac:
  category: public.app-category.business
  icon: assets/icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  # Default-style layout: the first entry (no `type`) is the packaged .app icon,
  # and the second is a symlink to /Applications. The previous config declared
  # `type: file` with no `path`, which made electron-builder try to stat the
  # project root as a file and fail with `⨯ founder-portal not a file`.
  contents:
    - x: 150
      y: 190
    - x: 450
      y: 190
      type: link
      path: /Applications
  window:
    width: 600
    height: 400

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Theseus Founder Portal"
  menuCategory: "Theseus"

publish:
  provider: github
  owner: mrquintin
  repo: mqtheseuswork
