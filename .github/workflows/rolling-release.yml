name: Rolling Release

# Builds installers for all three apps on every push to main and uploads
# them to a single rolling "latest-main" GitHub Release. This keeps the
# README's /releases/latest/download/... links pointing at installers built
# from the tip of main. Versioned releases (v*) are handled by release.yml.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dialectic:
    uses: ./.github/workflows/build-dialectic.yml
  build-noosphere:
    uses: ./.github/workflows/build-noosphere.yml
  build-founder-portal:
    uses: ./.github/workflows/build-founder-portal.yml
    secrets: inherit

  publish:
    needs: [build-dialectic, build-noosphere, build-founder-portal]
    # Run publish even if some builds failed, so we release whatever succeeded.
    # This way a failing app build doesn't block releases for the other apps.
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: ls -R artifacts || true

      - name: Normalize installer filenames
        run: |
          mkdir -p release
          pick_first() {
            # $1 = glob, $2 = dest in release/
            local match
            match=$(ls -1 $1 2>/dev/null | head -n1 || true)
            if [ -n "$match" ] && [ -f "$match" ]; then
              cp "$match" "release/$2"
              echo "Added: $2 (from $match)"
            else
              echo "Missing: $2 (no match for $1)"
            fi
          }

          # Dialectic
          pick_first 'artifacts/dialectic-macos/*.dmg' Dialectic.dmg
          # NSIS installer is specifically Dialectic-Setup.exe; ignore the
          # PyInstaller runtime exe inside dialectic-windows/Dialectic/.
          pick_first 'artifacts/dialectic-windows/Dialectic-Setup.exe' Dialectic-Setup.exe

          # Noosphere
          pick_first 'artifacts/noosphere-macos/noosphere-*-macos.tar.gz' noosphere-macos.tar.gz
          pick_first 'artifacts/noosphere-windows/Noosphere-Setup.exe' Noosphere-Setup.exe

          # Founder Portal (electron-builder produces arm64 and x64 DMGs
          # separately; expose both but alias the arm64 build as the primary
          # Theseus-Founder-Portal.dmg for the default download link).
          pick_first 'artifacts/founder-portal-macos/*arm64*.dmg' Theseus-Founder-Portal-arm64.dmg
          pick_first 'artifacts/founder-portal-macos/*x64*.dmg' Theseus-Founder-Portal-x64.dmg
          if [ -f release/Theseus-Founder-Portal-arm64.dmg ]; then
            cp release/Theseus-Founder-Portal-arm64.dmg release/Theseus-Founder-Portal.dmg
            echo "Aliased: Theseus-Founder-Portal.dmg → arm64 build"
          elif ls artifacts/founder-portal-macos/*.dmg >/dev/null 2>&1; then
            pick_first 'artifacts/founder-portal-macos/*.dmg' Theseus-Founder-Portal.dmg
          fi
          pick_first 'artifacts/founder-portal-windows/*.exe' Theseus-Founder-Portal-Setup.exe

          echo ""
          echo "--- Release files ---"
          ls -la release/ || true

      - name: Delete previous rolling release (if any)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-main --yes --cleanup-tag || true

      - name: Create/update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: "Latest build from main"
          body: |
            Automatically built from the tip of `main` (commit ${{ github.sha }}).

            These installers are rebuilt on every push to `main`. For stable
            versioned releases, see tags starting with `v`.
          files: release/*
          draft: false
          prerelease: false
          make_latest: "true"
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
