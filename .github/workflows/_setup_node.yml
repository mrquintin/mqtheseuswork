name: _setup_node

# Reusable Node.js setup. Centralizes:
#   - node-version pin (default 20)
#   - npm cache keyed off the lockfile hash
#   - install command (npm ci by default; falls back to npm install if
#     no lockfile, which the dead-code survey relied on)
#
# Non-runnable on its own — invoke via
#   jobs.X.uses: ./.github/workflows/_setup_node.yml

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'
      working-directory:
        type: string
        default: 'theseus-codex'
      install-command:
        type: string
        default: 'npm ci --no-audit --no-fund'
      extra-npm-packages:
        type: string
        default: ''
        description: 'Whitespace-separated extra npm packages to install --no-save after the main install.'
      script:
        type: string
        required: true
        description: 'Bash run after setup — the job body.'
      env-vars:
        type: string
        default: ''
      timeout-minutes:
        type: number
        default: 30
      runs-on:
        type: string
        default: 'ubuntu-latest'
      upload-artifact-name:
        type: string
        default: ''
      upload-artifact-path:
        type: string
        default: ''
      upload-artifact-retention-days:
        type: number
        default: 30
      upload-artifact-if-no-files-found:
        type: string
        default: 'warn'

permissions:
  contents: read

jobs:
  run:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install node deps
        working-directory: ${{ inputs.working-directory }}
        env:
          # Prisma 7 loads prisma.config.ts during postinstall/generate and
          # requires a syntactically valid Postgres DATABASE_URL even when it
          # is not connecting. This non-secret placeholder is scoped to the
          # install step only; workflow scripts can still export real DB URLs.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          INSTALL_COMMAND: ${{ inputs.install-command }}
          EXTRA_NPM_PACKAGES: ${{ inputs.extra-npm-packages }}
        run: |
          set -euo pipefail
          # word-split intentional
          ${INSTALL_COMMAND}
          if [ -n "${EXTRA_NPM_PACKAGES}" ]; then
            npm install --no-save ${EXTRA_NPM_PACKAGES}
          fi

      - name: Export non-secret env vars
        if: inputs.env-vars != ''
        env:
          ENV_VARS: ${{ inputs.env-vars }}
        run: |
          set -euo pipefail
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "$line" >> "$GITHUB_ENV"
          done <<< "$ENV_VARS"

      - name: Run script
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          ${{ inputs.script }}

      - name: Upload artifact
        if: always() && inputs.upload-artifact-name != '' && inputs.upload-artifact-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.upload-artifact-name }}
          path: ${{ inputs.upload-artifact-path }}
          if-no-files-found: ${{ inputs.upload-artifact-if-no-files-found }}
          retention-days: ${{ inputs.upload-artifact-retention-days }}
