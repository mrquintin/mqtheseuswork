name: Theseus Codex - public publishing

# Dedicated public-facing publishing loop for Currents and generated articles.
# This is intentionally separate from upload processing so transcript/indexing
# backfills cannot prevent the public site from receiving fresh material.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: theseus-public-publishing
  cancel-in-progress: false

jobs:
  publish:
    name: Generate public currents and articles
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: noosphere/requirements.txt

      - name: Install Noosphere
        working-directory: noosphere
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Verify publishing prerequisites
        env:
          CODEX_DATABASE_URL: ${{ secrets.CODEX_DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          set -eo pipefail
          missing=0
          for name in CODEX_DATABASE_URL ANTHROPIC_API_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required for public Currents/article publishing."
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            exit 1
          fi
          if [ -z "${X_BEARER_TOKEN:-}" ]; then
            echo "::warning::X_BEARER_TOKEN is missing; scheduled public publishing will still run, but fresh X/Twitter discovery is disabled until the secret is added."
          fi

      - name: Resolve public organization
        id: org
        working-directory: noosphere
        env:
          PYTHONPATH: ${{ github.workspace }}/noosphere
          DATABASE_URL: ${{ secrets.CODEX_DATABASE_URL }}
          CURRENTS_INGEST_ORG_ID: ${{ secrets.CURRENTS_INGEST_ORG_ID }}
        run: |
          set -eo pipefail
          if [ -n "${CURRENTS_INGEST_ORG_ID:-}" ]; then
            echo "org_id=$CURRENTS_INGEST_ORG_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          org_id="$(python - <<'PY'
          import os
          import psycopg2
          from noosphere.codex_bridge import _psycopg2_compatible_url

          url = _psycopg2_compatible_url(os.environ["DATABASE_URL"])
          with psycopg2.connect(url) as conn, conn.cursor() as cur:
              cur.execute(
                  'SELECT id FROM "Organization" ORDER BY CASE WHEN slug IN (%s, %s) THEN 0 ELSE 1 END, id ASC LIMIT 1',
                  ("theseus", "theseus-local"),
              )
              row = cur.fetchone()
          print(row[0] if row else "")
          PY
          )"
          if [ -z "$org_id" ]; then
            echo "::error::Could not resolve a public Organization row."
            exit 1
          fi
          echo "org_id=$org_id" >> "$GITHUB_OUTPUT"

      - name: Publish current-events opinions and articles
        working-directory: noosphere
        env:
          PYTHONPATH: ${{ github.workspace }}/noosphere
          DIRECT_URL: ${{ secrets.CODEX_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.CODEX_DATABASE_URL }}
          THESEUS_CODEX_DATABASE_URL: ${{ secrets.CODEX_DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          CURRENTS_INGEST_ORG_ID: ${{ steps.org.outputs.org_id }}
          CURRENTS_X_SEARCH_QUERIES: ${{ secrets.CURRENTS_X_SEARCH_QUERIES }}
          CURRENTS_X_DISCOVERY_ENABLED: ${{ vars.CURRENTS_X_DISCOVERY_ENABLED || 'true' }}
          CURRENTS_X_DISCOVERY_MAX_CANDIDATES: ${{ vars.CURRENTS_X_DISCOVERY_MAX_CANDIDATES || '100' }}
          CURRENTS_MIN_SIGNIFICANCE_SCORE: ${{ vars.CURRENTS_MIN_SIGNIFICANCE_SCORE || '1.35' }}
          CURRENTS_MAX_EVENTS_PER_CYCLE: ${{ vars.CURRENTS_MAX_EVENTS_PER_CYCLE || '25' }}
          ARTICLES_ENABLED: "true"
          ARTICLES_DISPATCH_INTERVAL_SECONDS: ${{ vars.ARTICLES_DISPATCH_INTERVAL_SECONDS || '1800' }}
          ARTICLES_THEMATIC_MIN_OPINIONS: ${{ vars.ARTICLES_THEMATIC_MIN_OPINIONS || '2' }}
          ARTICLES_THEMATIC_MIN_CORPUS_SOURCES: ${{ vars.ARTICLES_THEMATIC_MIN_CORPUS_SOURCES || '2' }}
          ARTICLES_THEMATIC_ALLOW_RAW_EVENTS: ${{ vars.ARTICLES_THEMATIC_ALLOW_RAW_EVENTS || 'false' }}
          NOOSPHERE_ARTICLES_WEEKLY_CAP: ${{ vars.NOOSPHERE_ARTICLES_WEEKLY_CAP || '3' }}
          NOOSPHERE_DB_SPANS: "1"
          NOOSPHERE_SKIP_AUTH: "1"
        run: |
          set -eo pipefail
          echo "+ python -m noosphere.currents once"
          python -m noosphere.currents once
