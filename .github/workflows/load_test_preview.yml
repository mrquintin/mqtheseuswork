name: Load test (preview deploy)

# Runs the "light" profile against every Vercel preview deploy.
# A failed run blocks the deploy gate. To override, dispatch the
# workflow manually with an `override_reason` input — the reason is
# written into the results JSON for audit.
#
# Round 17 consolidation: setup is delegated to ./_setup_python.yml.
# Caller-resolved env (preview URL, slug, override reason) is passed
# via the reusable's `env-vars:` input so the script body has no
# `${{ }}` interpolation of its own.

on:
  pull_request:
    paths:
      - "tests/load/**"
      - "theseus-codex/src/app/api/public/**"
      - "theseus-codex/src/app/post/**"
      - "theseus-codex/src/app/c/**"
      - "theseus-codex/src/app/(home)/**"
      - "theseus-codex/src/app/page.tsx"
      - ".github/workflows/load_test_preview.yml"
      - ".github/workflows/_setup_python.yml"
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Preview deploy URL to hit"
        required: true
      article_slug:
        description: "Article slug to load on /post/<slug>"
        required: true
      conclusion_id:
        description: "Optional conclusion id for the lineage call"
        required: false
        default: ""
      override_reason:
        description: "If set, a failing run is recorded but does not block."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: load-test-preview-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  load-test-light:
    # Only act on a successful preview deploy or an explicit dispatch
    # or a PR push. Skip every other deployment_status state.
    if: >-
      github.event_name != 'deployment_status' ||
      github.event.deployment_status.state == 'success'
    uses: ./.github/workflows/_setup_python.yml
    with:
      python-version: '3.11'
      timeout-minutes: 20
      env-vars: |
        LOAD_TEST_BASE_URL=${{ github.event_name == 'deployment_status' && github.event.deployment_status.target_url || github.event.inputs.base_url }}
        LOAD_TEST_ARTICLE_SLUG=${{ github.event.inputs.article_slug || vars.LOAD_TEST_ARTICLE_SLUG }}
        LOAD_TEST_CONCLUSION_ID=${{ github.event.inputs.conclusion_id }}
        LOAD_TEST_OVERRIDE_REASON=${{ github.event.inputs.override_reason }}
      upload-artifact-name: load-test-light-${{ github.run_id }}
      upload-artifact-path: tests/load/results/*.json
      upload-artifact-retention-days: 30
      script: |
        if [ -z "${LOAD_TEST_BASE_URL}" ]; then
          echo "no preview URL available; skipping load test" >&2
          exit 78
        fi
        python tests/load/article_viral.py --profile light
