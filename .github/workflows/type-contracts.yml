name: Type Contracts

# Round 17 consolidation: Python and TypeScript sides each delegate
# their setup to the matching reusable workflow under
# .github/workflows/_setup_*.yml. The contract tests still run as
# two independent jobs so a TS-only regression doesn't mask a
# Python-side break (or vice versa).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/shared-schemas/**"
      - "noosphere/**"
      - "current_events_api/**"
      - "noosphere/noosphere/_generated/**"
      - "theseus-codex/src/lib/_generated/**"
      - "theseus-codex/__tests__/**"
      - "noosphere/tests/test_type_contracts.py"
      - "noosphere/.import-linter"
      - "scripts/check_no_import_cycles.py"
      - "scripts/generate_api_types.py"
      - "tests/static/**"
      - "theseus-codex/src/__tests__/type-contracts.test.ts"
      - ".github/workflows/type-contracts.yml"
      - ".github/workflows/_setup_python.yml"
      - ".github/workflows/_setup_node.yml"

permissions:
  contents: read

concurrency:
  group: type-contracts-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python-side:
    name: Pydantic generation + contract
    uses: ./.github/workflows/_setup_python.yml
    with:
      python-version: '3.11'
      pip-extras: 'dev'
      extra-packages: 'datamodel-code-generator==0.26.* jsonschema==4.* pydantic==2.*'
      timeout-minutes: 15
      script: |
        # cwd: repo root.
        python packages/shared-schemas/scripts/generate_pydantic.py --check

        # Lint — every generated file must declare AUTOGENERATED.
        for f in noosphere/noosphere/_generated/*.py; do
          head -c 4096 "$f" | grep -q AUTOGENERATED || {
            echo "::error file=$f::missing AUTOGENERATED banner — was the file edited by hand?"
            exit 1
          }
        done

        pytest noosphere/tests/test_type_contracts.py -q

  typescript-side:
    name: TypeScript generation + contract
    uses: ./.github/workflows/_setup_node.yml
    with:
      node-version: '20'
      working-directory: 'theseus-codex'
      install-command: 'npm install --no-audit --no-fund'
      extra-npm-packages: 'json-schema-to-typescript@^15 ajv@^8 ajv-formats@^3'
      timeout-minutes: 15
      script: |
        # cwd: theseus-codex (per the reusable's working-directory).
        # Generation reads from the repo-root packages/ tree.
        ( cd "${GITHUB_WORKSPACE}" && npx tsx packages/shared-schemas/scripts/generate_typescript.ts --check )

        # Lint — every generated file must declare AUTOGENERATED.
        for f in "${GITHUB_WORKSPACE}"/theseus-codex/src/lib/_generated/*.ts; do
          head -c 4096 "$f" | grep -q AUTOGENERATED || {
            echo "::error file=$f::missing AUTOGENERATED banner — was the file edited by hand?"
            exit 1
          }
        done

        npx vitest run src/__tests__/type-contracts.test.ts

  round19-import-cycles:
    name: Round-19 import-cycle + layering gate
    uses: ./.github/workflows/_setup_python.yml
    with:
      python-version: '3.11'
      pip-extras: 'dev'
      extra-packages: 'import-linter==2.* grimp==3.* pydantic==2.* fastapi==0.115.*'
      timeout-minutes: 10
      script: |
        # cwd: repo root.
        python scripts/check_no_import_cycles.py
        pytest tests/static/test_no_import_cycles.py -q

  round19-api-type-contract:
    name: Round-19 API type-contract gate
    uses: ./.github/workflows/_setup_python.yml
    with:
      python-version: '3.11'
      # `generate_api_types.py` imports current_events_api.main which
      # transitively pulls noosphere (numpy, sqlmodel, fastapi, …). Use
      # the full noosphere requirements file so the import chain
      # resolves; extra-packages then pins the two versions the
      # generator cares about.
      requirements-path: 'noosphere/requirements.txt'
      pip-extras: 'dev'
      extra-packages: 'pydantic==2.* fastapi==0.115.*'
      timeout-minutes: 15
      script: |
        # cwd: repo root.
        # Re-run the generator and refuse on drift.
        python scripts/generate_api_types.py --check
        pytest tests/static/test_api_types_in_sync.py -q

  round19-frontend-consumers:
    name: Round-19 frontend consumer contract
    uses: ./.github/workflows/_setup_node.yml
    with:
      node-version: '20'
      working-directory: 'theseus-codex'
      install-command: 'npm install --no-audit --no-fund'
      timeout-minutes: 10
      script: |
        # cwd: theseus-codex. The frontend test scans src/lib + src/app/api
        # against the committed _generated/api bundle.
        npx vitest run __tests__/api_consumers_use_generated_types.test.ts
