name: Type Contracts

# Round 17 consolidation: Python and TypeScript sides each delegate
# their setup to the matching reusable workflow under
# .github/workflows/_setup_*.yml. The contract tests still run as
# two independent jobs so a TS-only regression doesn't mask a
# Python-side break (or vice versa).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/shared-schemas/**"
      - "noosphere/noosphere/_generated/**"
      - "theseus-codex/src/lib/_generated/**"
      - "noosphere/tests/test_type_contracts.py"
      - "theseus-codex/src/__tests__/type-contracts.test.ts"
      - ".github/workflows/type-contracts.yml"
      - ".github/workflows/_setup_python.yml"
      - ".github/workflows/_setup_node.yml"

permissions:
  contents: read

concurrency:
  group: type-contracts-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python-side:
    name: Pydantic generation + contract
    uses: ./.github/workflows/_setup_python.yml
    with:
      python-version: '3.11'
      pip-extras: 'dev'
      extra-packages: 'datamodel-code-generator==0.26.* jsonschema==4.* pydantic==2.*'
      timeout-minutes: 15
      script: |
        # cwd: repo root.
        python packages/shared-schemas/scripts/generate_pydantic.py --check

        # Lint — every generated file must declare AUTOGENERATED.
        for f in noosphere/noosphere/_generated/*.py; do
          head -c 4096 "$f" | grep -q AUTOGENERATED || {
            echo "::error file=$f::missing AUTOGENERATED banner — was the file edited by hand?"
            exit 1
          }
        done

        pytest noosphere/tests/test_type_contracts.py -q

  typescript-side:
    name: TypeScript generation + contract
    uses: ./.github/workflows/_setup_node.yml
    with:
      node-version: '20'
      working-directory: 'theseus-codex'
      install-command: 'npm install --no-audit --no-fund'
      extra-npm-packages: 'json-schema-to-typescript@^15 ajv@^8 ajv-formats@^3'
      timeout-minutes: 15
      script: |
        # cwd: theseus-codex (per the reusable's working-directory).
        # Generation reads from the repo-root packages/ tree.
        ( cd "${GITHUB_WORKSPACE}" && npx tsx packages/shared-schemas/scripts/generate_typescript.ts --check )

        # Lint — every generated file must declare AUTOGENERATED.
        for f in "${GITHUB_WORKSPACE}"/theseus-codex/src/lib/_generated/*.ts; do
          head -c 4096 "$f" | grep -q AUTOGENERATED || {
            echo "::error file=$f::missing AUTOGENERATED banner — was the file edited by hand?"
            exit 1
          }
        done

        npx vitest run src/__tests__/type-contracts.test.ts
