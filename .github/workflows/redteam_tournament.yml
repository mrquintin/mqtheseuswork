name: Red-team tournament

# Weekly: rotate the adversarial peer-review swarm across reviewer
# configurations on the frozen v1 conclusion bench and archive the
# leaderboard. Drift across runs is a signal for the method-drift
# detector (prompt 04). Also runs on PRs that touch the harness so
# regressions surface before merge.
#
# Round 17 consolidation: setup is delegated to ./_setup_python.yml.
# Provider API keys flow via `secrets: inherit`; the reusable maps
# the well-known LLM provider secret names into env. See
# .github/workflows/_secrets.md for the registry.

on:
  schedule:
    # 04:15 UTC every Monday — well outside cron rush hour and
    # outside the qh_benchmark window.
    - cron: '15 4 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'noosphere/noosphere/peer_review/tournament.py'
      - 'noosphere/tests/test_redteam_tournament.py'
      - 'noosphere/scripts/run_redteam_tournament.sh'
      - 'benchmarks/redteam/**'
      - '.github/workflows/redteam_tournament.yml'
      - '.github/workflows/_setup_python.yml'
  push:
    branches: [main]
    paths:
      - 'noosphere/noosphere/peer_review/tournament.py'
      - 'benchmarks/redteam/**'
      - '.github/workflows/redteam_tournament.yml'
      - '.github/workflows/_setup_python.yml'

permissions:
  contents: read

concurrency:
  group: redteam-tournament-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tournament:
    uses: ./.github/workflows/_setup_python.yml
    secrets: inherit
    with:
      python-version: '3.11'
      requirements-path: 'noosphere/requirements.txt'
      install-editable: 'noosphere'
      working-directory: 'noosphere'
      timeout-minutes: 30
      upload-artifact-name: redteam-tournament-${{ github.run_id }}
      upload-artifact-path: |
        noosphere_data/redteam_tournament/archive/
        theseus-codex/public/redteam/
      upload-artifact-retention-days: 365
      script: |
        # cwd: noosphere
        # Provider keys are read from the environment (mapped by the
        # reusable from `secrets: inherit`); missing keys are logged
        # and skipped, never error.
        PYTHONPATH="${GITHUB_WORKSPACE}/noosphere" pytest tests/test_redteam_tournament.py -q

        export REDTEAM_ARCHIVE="${GITHUB_WORKSPACE}/noosphere_data/redteam_tournament/archive"
        mkdir -p "${REDTEAM_ARCHIVE}"
        cd "${GITHUB_WORKSPACE}"
        ./noosphere/scripts/run_redteam_tournament.sh

        # Refresh the public leaderboard snapshot in theseus-codex.
        mkdir -p theseus-codex/public/redteam
        cp -v noosphere_data/redteam_tournament/archive/tournament-*.json \
           theseus-codex/public/redteam/ || true
        # Stable filename so the public page can fetch without
        # timestamp coupling.
        latest="$(ls -t noosphere_data/redteam_tournament/archive/tournament-*.json 2>/dev/null | head -n1 || true)"
        if [ -n "${latest}" ]; then
          cp "${latest}" theseus-codex/public/redteam/latest.json
        fi
