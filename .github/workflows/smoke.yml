name: smoke

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: full-stack smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # Install the in-repo packages plus their runtime deps.
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install -e ./noosphere || true
          pip install -e ./dialectic || true
          pip install -e ./current_events_api || true
          # Minimum extras for the API smoke (FastAPI TestClient).
          pip install httpx starlette fastapi pydantic sqlmodel typer

      - name: Run smoke harness
        env:
          # Pin a CORS origin so the FastAPI app boots without
          # complaining about wildcard origins.
          CURRENTS_CORS_ORIGINS: "http://127.0.0.1:3000"
        run: |
          ./scripts/smoke/run.sh

      - name: Run Round-19 integration tests
        # The integration suite exercises the algorithm-layer
        # continuity contract (drafter → runtime → synthesizer →
        # memo → portfolio agent → bet → resolution → calibration →
        # contradiction engine). Hermetic — no live LLM, no HTTP —
        # so it runs in the same job as the smoke harness rather
        # than spawning a parallel runner.
        run: |
          python -m pip install pyyaml
          python -m pytest tests/integration -m integration -v --tb=short

      - name: Locate smoke artifacts
        if: always()
        id: artifacts
        run: |
          latest="$(ls -1dt docs/verification/smoke/*/ 2>/dev/null | head -n1 || true)"
          echo "dir=${latest}" >> "$GITHUB_OUTPUT"

      - name: Upload smoke artifacts
        if: always() && steps.artifacts.outputs.dir != ''
        uses: actions/upload-artifact@v7
        with:
          name: smoke-${{ github.run_id }}
          path: ${{ steps.artifacts.outputs.dir }}
          if-no-files-found: warn

      - name: Build PR comment body
        if: always() && github.event_name == 'pull_request' && steps.artifacts.outputs.dir != ''
        id: comment
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import pathlib

          out_dir = pathlib.Path(os.environ["DIR"])
          summary_path = out_dir / "SUMMARY.json"
          lines = ["## Smoke harness", ""]
          if not summary_path.exists():
              lines.append("_SUMMARY.json not produced — see workflow logs._")
          else:
              data = json.loads(summary_path.read_text())
              status = "✅ pass" if data.get("ok") else "❌ fail"
              lines.append(f"**Status:** {status}")
              passed = data.get("passed") or []
              failed = data.get("failed") or []
              lines.append(f"**Passed:** {', '.join(passed) if passed else '_none_'}")
              if failed:
                  lines.append(f"**Failed:** {', '.join(failed)}")
                  for section in failed:
                      sj = out_dir / f"{section}.json"
                      if sj.exists():
                          payload = json.loads(sj.read_text())
                          bad = [c for c in payload.get("checks", []) if not c.get("ok")]
                          if bad:
                              lines.append("")
                              lines.append(f"<details><summary>{section} — {len(bad)} failing check(s)</summary>")
                              lines.append("")
                              for c in bad[:25]:
                                  lines.append(f"- `{c.get('name')}` — {c.get('detail')}")
                              if len(bad) > 25:
                                  lines.append(f"- … and {len(bad)-25} more")
                              lines.append("")
                              lines.append("</details>")
          body = "\n".join(lines)
          # GitHub Actions multi-line output protocol.
          delim = "EOF_smoke_comment"
          print(f"body<<{delim}")
          print(body)
          print(delim)
          PY
        env:
          DIR: ${{ steps.artifacts.outputs.dir }}

      - name: Post PR comment
        # Dependabot PRs run with a read-only GITHUB_TOKEN by default, so
        # writing a comment 403s ("Resource not accessible by integration").
        # That doesn't reflect a real smoke failure — it's just a token
        # permission mismatch — so let it fail without failing the workflow.
        # Non-Dependabot PRs still need this to be a hard gate (we want to
        # know when the comment-publishing surface is broken), so we limit
        # continue-on-error to dependabot[bot] specifically.
        continue-on-error: ${{ github.actor == 'dependabot[bot]' }}
        if: always() && github.event_name == 'pull_request' && steps.comment.outputs.body != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.comment.outputs.body }}
