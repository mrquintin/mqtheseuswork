name: Load test (nightly + spike)

# Two triggers, one workflow:
#   * schedule  → runs the "viral" profile against staging every night.
#   * workflow_dispatch → operator-triggered "spike" run. Required to be
#     manual because spike can saturate the API rate limits of any
#     upstream the deploy fans out to.
#
# A failing nightly run opens an issue (handled by the deploy gate
# elsewhere); a failing spike run requires the dispatcher to set
# `override_reason` to mark the run as accepted.
#
# Round 17 consolidation: setup is delegated to ./_setup_python.yml.
# Profile resolution happens in the caller via expressions; the
# resolved value is forwarded to the script via `env-vars:`.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly.
  workflow_dispatch:
    inputs:
      profile:
        description: "Which profile to run (viral or spike)."
        required: true
        default: "spike"
        type: choice
        options:
          - viral
          - spike
      base_url:
        description: "Override the staging URL (defaults to vars.LOAD_TEST_STAGING_URL)."
        required: false
        default: ""
      article_slug:
        description: "Article slug to load on /post/<slug>"
        required: true
      conclusion_id:
        description: "Optional conclusion id for the lineage call"
        required: false
        default: ""
      override_reason:
        description: "Required to accept a failing spike run; recorded in the results JSON."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  # Distinct group from the preview workflow so a nightly run never
  # cancels a PR's load test (and vice versa).
  group: load-test-nightly-${{ github.ref }}-${{ github.event_name == 'schedule' && 'viral' || github.event.inputs.profile }}
  cancel-in-progress: false

jobs:
  load-test:
    uses: ./.github/workflows/_setup_python.yml
    with:
      python-version: '3.11'
      timeout-minutes: 30
      env-vars: |
        LOAD_TEST_PROFILE=${{ github.event_name == 'schedule' && 'viral' || github.event.inputs.profile }}
        LOAD_TEST_BASE_URL=${{ github.event.inputs.base_url != '' && github.event.inputs.base_url || vars.LOAD_TEST_STAGING_URL }}
        LOAD_TEST_ARTICLE_SLUG=${{ github.event.inputs.article_slug || vars.LOAD_TEST_ARTICLE_SLUG }}
        LOAD_TEST_CONCLUSION_ID=${{ github.event.inputs.conclusion_id }}
        LOAD_TEST_OVERRIDE_REASON=${{ github.event.inputs.override_reason }}
      upload-artifact-name: load-test-${{ github.run_id }}
      upload-artifact-path: tests/load/results/*.json
      upload-artifact-retention-days: 90
      script: |
        if [ -z "${LOAD_TEST_BASE_URL}" ]; then
          echo "LOAD_TEST_STAGING_URL is not set; cannot run" >&2
          exit 1
        fi
        if [ "${LOAD_TEST_PROFILE}" = "spike" ] && [ -z "${LOAD_TEST_OVERRIDE_REASON}" ]; then
          echo "::notice::spike profile is allowed to fail only with a recorded override_reason input."
        fi
        python tests/load/article_viral.py --profile "${LOAD_TEST_PROFILE}"
