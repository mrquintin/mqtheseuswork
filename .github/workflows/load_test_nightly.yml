name: Load test (nightly + spike)

# Two triggers, one workflow:
#   * schedule  → runs the "viral" profile against staging every night.
#   * workflow_dispatch → operator-triggered "spike" run. Required to be
#     manual because spike can saturate the API rate limits of any
#     upstream the deploy fans out to.
#
# A failing nightly run opens an issue (handled by the deploy gate
# elsewhere); a failing spike run requires the dispatcher to set
# `override_reason` to mark the run as accepted.
on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly.
  workflow_dispatch:
    inputs:
      profile:
        description: "Which profile to run (viral or spike)."
        required: true
        default: "spike"
        type: choice
        options:
          - viral
          - spike
      base_url:
        description: "Override the staging URL (defaults to vars.LOAD_TEST_STAGING_URL)."
        required: false
        default: ""
      article_slug:
        description: "Article slug to load on /post/<slug>"
        required: true
      conclusion_id:
        description: "Optional conclusion id for the lineage call"
        required: false
        default: ""
      override_reason:
        description: "Required to accept a failing spike run; recorded in the results JSON."
        required: false
        default: ""

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve profile and base URL
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            PROFILE="viral"
          else
            PROFILE="${{ github.event.inputs.profile }}"
          fi
          BASE_URL="${{ github.event.inputs.base_url }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="${{ vars.LOAD_TEST_STAGING_URL }}"
          fi
          if [ -z "$BASE_URL" ]; then
            echo "LOAD_TEST_STAGING_URL is not set; cannot run" >&2
            exit 1
          fi
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Validate spike override reason
        if: steps.resolve.outputs.profile == 'spike' && github.event.inputs.override_reason == ''
        run: |
          echo "::notice::spike profile is allowed to fail only with a recorded override_reason input."

      - name: Run profile
        env:
          LOAD_TEST_BASE_URL: ${{ steps.resolve.outputs.base_url }}
          LOAD_TEST_ARTICLE_SLUG: ${{ github.event.inputs.article_slug || vars.LOAD_TEST_ARTICLE_SLUG }}
          LOAD_TEST_CONCLUSION_ID: ${{ github.event.inputs.conclusion_id }}
          LOAD_TEST_OVERRIDE_REASON: ${{ github.event.inputs.override_reason }}
        run: |
          python tests/load/article_viral.py --profile "${{ steps.resolve.outputs.profile }}"

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-${{ steps.resolve.outputs.profile }}-${{ github.run_id }}
          path: tests/load/results/*.json
          if-no-files-found: warn
          retention-days: 90
