name: Build Founder Portal Desktop

on:
  push:
    branches: [main]
    paths: ['founder-portal/**', '.github/workflows/build-founder-portal.yml']
  pull_request:
    paths: ['founder-portal/**', '.github/workflows/build-founder-portal.yml']
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            dist-flag: --mac
          - os: windows-latest
            platform: windows
            dist-flag: --win

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: founder-portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: founder-portal/package-lock.json

      # Cache the ~100 MB Electron binary + electron-builder tool downloads
      # between runs. Saves ~30–60s per platform when cache is warm.
      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('founder-portal/package-lock.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          # Prisma 7 requires DATABASE_URL at generate time. The URL is only
          # used for migrations/connections — for `prisma generate` it just
          # needs to resolve to something valid.
          DATABASE_URL: file:./prisma/dev.db
        run: npx prisma generate

      - name: Build Next.js
        env:
          DATABASE_URL: file:./prisma/dev.db
        run: npm run build

      - name: Compile Electron TypeScript
        run: npx tsc -p desktop/tsconfig.json

      - name: Generate icons
        run: node scripts/generate_icons.js

      - name: Build desktop app
        # GitHub Actions YAML can't conditionally *omit* an env var — only
        # set it to "". But electron-builder 26.x treats CSC_LINK="" as a
        # real file path relative to the project root and fails with
        # `⨯ /…/founder-portal not a file`. Workaround: drop empty signing
        # vars in the shell just before invoking electron-builder. `shell:
        # bash` works on all GitHub-hosted runners (incl. Windows via Git
        # Bash), so the same logic covers both matrix legs.
        shell: bash
        run: |
          [ -z "${CSC_LINK:-}" ] && unset CSC_LINK || true
          [ -z "${CSC_KEY_PASSWORD:-}" ] && unset CSC_KEY_PASSWORD || true
          [ -z "${WIN_CSC_LINK:-}" ] && unset WIN_CSC_LINK || true
          [ -z "${WIN_CSC_KEY_PASSWORD:-}" ] && unset WIN_CSC_KEY_PASSWORD || true
          npx electron-builder ${{ matrix.dist-flag }} --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # These start as "" when the corresponding secret is unset; the
          # shell block above unsets them before electron-builder runs.
          CSC_LINK: ${{ secrets.MAC_CERT_PASSWORD != '' && secrets.MAC_CERT_P12_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CERT_PASSWORD != '' && secrets.WIN_CERT_PFX_BASE64 || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: founder-portal-${{ matrix.platform }}
          path: |
            founder-portal/dist-electron/*.dmg
            founder-portal/dist-electron/*.exe
            founder-portal/dist-electron/*.zip
            founder-portal/dist-electron/*.blockmap
            founder-portal/dist-electron/latest*.yml
          retention-days: 30
          if-no-files-found: warn
