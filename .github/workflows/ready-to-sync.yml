name: Ready-to-Sync Nightly

# Runs the full pre-sync gate (scripts/ready-to-sync.sh) on main nightly.
# If the nightly fails an issue is opened/refreshed so the operator sees
# drift the morning after, not days later. Manual dispatch is also wired
# up for ad-hoc verification.

on:
  schedule:
    # 07:17 UTC ≈ 03:17 Eastern / 23:17 Pacific. Off-peak for runners.
    - cron: "17 7 * * *"
  workflow_dispatch:
    inputs:
      from_step:
        description: "Resume gate from step N (1-8)"
        required: false
        default: ""
      skip_steps:
        description: "Comma-separated steps to skip (1-8)"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

concurrency:
  group: ready-to-sync-nightly
  cancel-in-progress: false

jobs:
  gate:
    name: ready-to-sync gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node (for smoke harness frontend probes)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Editable install picks up scripts and pytest config from pyproject.
          if [ -f pyproject.toml ]; then
            python -m pip install -e ".[dev]" || python -m pip install -e .
          fi
          if [ -f noosphere/requirements.txt ]; then
            python -m pip install -r noosphere/requirements.txt
          fi
          python -m pip install pyyaml pytest

      - name: Run the gate
        id: gate
        env:
          # The gate's per-step logs go under docs/verification/. We upload
          # the whole tree as an artifact regardless of outcome.
          CI: "1"
        run: |
          set +e
          args=()
          if [ -n "${{ inputs.from_step }}" ]; then
            args+=(--from "${{ inputs.from_step }}")
          fi
          if [ -n "${{ inputs.skip_steps }}" ]; then
            args+=(--skip "${{ inputs.skip_steps }}" --skip-reason "nightly dispatch override")
          fi
          # --no-color keeps the log readable in the Actions UI.
          args+=(--no-color)
          ./scripts/ready-to-sync.sh "${args[@]}"
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ready-to-sync-report
          path: docs/verification/ready_to_sync/
          if-no-files-found: warn
          retention-days: 14

      - name: Open or refresh failure issue
        if: failure() || steps.gate.outputs.rc != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Nightly ready-to-sync gate failed";
            const body = [
              "The nightly `ready-to-sync` gate failed on `main`.",
              "",
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Commit: ${context.sha}`,
              "",
              "Download the `ready-to-sync-report` artifact from that run",
              "to see which step failed and the per-step log. Resume the",
              "gate locally with `./scripts/ready-to-sync.sh --from <step>`",
              "once the fix is in.",
            ].join("\n");

            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "ready-to-sync,nightly",
              per_page: 5,
            });
            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["ready-to-sync", "nightly"],
              });
            }

      - name: Fail step if gate failed
        if: steps.gate.outputs.rc != '0'
        run: |
          echo "::error::ready-to-sync gate failed (rc=${{ steps.gate.outputs.rc }})"
          exit 1
