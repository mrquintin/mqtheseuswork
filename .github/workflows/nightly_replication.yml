name: Nightly Replication

# Minimal nightly replication so silent breakage of the firm's headline
# claims is caught early. The job runs the harness in deterministic
# mode on a small shard and verifies the result against a recorded
# baseline run captured on the main branch. Drift on this benchmark
# is a louder alert than method drift — the badge for this workflow
# is what the public replication page links.
#
# Round 17 consolidation: setup is delegated to ./_setup_python.yml.
# Determinism env vars are injected via the reusable's `env-vars:`
# input so the call site is the single declaration of "what is held
# fixed in CI".

on:
  schedule:
    # 07:15 UTC nightly — staggered against qh_benchmark.yml.
    - cron: '15 7 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'replication/**'
      - 'noosphere/noosphere/benchmarks/**'
      - 'benchmarks/quintin_hypothesis/**'
      - 'pyproject.toml'
      - '.github/workflows/nightly_replication.yml'
      - '.github/workflows/_setup_python.yml'
  push:
    branches: [main]
    paths:
      - 'replication/**'
      - 'noosphere/noosphere/benchmarks/**'
      - 'pyproject.toml'
      - '.github/workflows/nightly_replication.yml'
      - '.github/workflows/_setup_python.yml'

permissions:
  contents: read

concurrency:
  group: nightly-replication-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  replicate:
    uses: ./.github/workflows/_setup_python.yml
    with:
      python-version: '3.11'
      requirements-path: 'noosphere/requirements.txt'
      pip-extras: 'dev'
      timeout-minutes: 25
      env-vars: |
        PYTHONHASHSEED=0
        OMP_NUM_THREADS=1
        MKL_NUM_THREADS=1
        OPENBLAS_NUM_THREADS=1
        THESEUS_CROSS_MODEL_BUDGET=50
      upload-artifact-name: nightly-replication-${{ github.run_id }}
      upload-artifact-path: |
        replication/runs/**/replication_envelope.json
        replication/runs/**/metrics_summary.json
        replication/runs/**/metrics_*.json
        replication/runs/**/results_*.json
      upload-artifact-retention-days: 30
      script: |
        # cwd: repo root (no working-directory override).
        pytest replication/tests -q

        # Use the Makefile so any CI-only deviation is visible. The
        # `smoke` target runs the deterministic, key-free subset.
        ( cd replication && make smoke RUN_ROOT="${GITHUB_WORKSPACE}/replication/runs" )

        # Record this run as the new baseline candidate.
        mkdir -p replication/runs/_latest
        cp -R replication/runs/*qh-benchmark*/. replication/runs/_latest/ 2>/dev/null || true
        ls -la replication/runs/

        # Verify against committed baseline (if present).
        BASELINE="replication/baselines/qh-benchmark"
        if [ -d "$BASELINE" ]; then
          CURRENT=$(ls -1td replication/runs/*qh-benchmark*/ | head -1)
          echo "[verify] baseline=$BASELINE current=$CURRENT"
          python -m replication.lib.verify "$BASELINE" "$CURRENT"
        else
          echo "[verify] no committed baseline at $BASELINE; skipping comparison"
          echo "::notice::Run replication/Makefile with the deterministic flag and commit a baseline to enable verify-on-CI."
        fi
