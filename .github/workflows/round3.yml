name: Round-3 invariants

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: noosphere/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r noosphere/requirements.txt
          pip install pytest
      - name: Run Python tests
        env:
          PYTHONPATH: noosphere
        run: python -m pytest noosphere/tests/ -q

  ts-tests:
    runs-on: ubuntu-latest
    env:
      # The TypeScript job does not connect to Postgres, but Prisma 7 validates
      # DATABASE_URL during `npm ci` because package.json postinstall runs
      # `prisma generate`.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            theseus-codex/package-lock.json
            theseus-public/package-lock.json
      # Both theseus-codex and theseus-public commit `package-lock.json`
      # (npm), not `pnpm-lock.yaml`. Using pnpm here caused the job to fail
      # with ERR_PNPM_NO_LOCKFILE on every run.
      - name: Install theseus-codex deps
        working-directory: theseus-codex
        run: npm ci --legacy-peer-deps
      - name: Typecheck theseus-codex
        working-directory: theseus-codex
        run: npx tsc --noEmit
      - name: Install theseus-public deps
        if: hashFiles('theseus-public/package.json') != ''
        working-directory: theseus-public
        run: npm ci --legacy-peer-deps
      - name: Typecheck theseus-public
        if: hashFiles('theseus-public/package.json') != ''
        working-directory: theseus-public
        run: npx tsc --noEmit

  round3-invariants:
    runs-on: ubuntu-latest
    needs: [python-tests, ts-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: noosphere/requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -r noosphere/requirements.txt
      - name: Run round-3 invariant checks
        env:
          PYTHONPATH: noosphere
        run: python scripts/check_round3_invariants.py
