name: Round-3 invariants

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: noosphere/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r noosphere/requirements.txt
          pip install pytest
      - name: Run Python tests
        env:
          PYTHONPATH: noosphere
        run: python -m pytest noosphere/tests/ -q

  ts-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            founder-portal/package-lock.json
            theseus-public/package-lock.json
      # Both founder-portal and theseus-public commit `package-lock.json`
      # (npm), not `pnpm-lock.yaml`. Using pnpm here caused the job to fail
      # with ERR_PNPM_NO_LOCKFILE on every run.
      - name: Install founder-portal deps
        working-directory: founder-portal
        run: npm ci
      - name: Typecheck founder-portal
        working-directory: founder-portal
        run: npx tsc --noEmit
      - name: Install theseus-public deps
        if: hashFiles('theseus-public/package.json') != ''
        working-directory: theseus-public
        run: npm ci
      - name: Typecheck theseus-public
        if: hashFiles('theseus-public/package.json') != ''
        working-directory: theseus-public
        run: npx tsc --noEmit

  round3-invariants:
    runs-on: ubuntu-latest
    needs: [python-tests, ts-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: noosphere/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -r noosphere/requirements.txt
      - name: Run round-3 invariant checks
        env:
          PYTHONPATH: noosphere
        run: python scripts/check_round3_invariants.py
