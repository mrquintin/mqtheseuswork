name: Build Dialectic

on:
  push:
    branches: [main]
    paths: ['dialectic/**', '.github/workflows/build-dialectic.yml']
  pull_request:
    paths: ['dialectic/**', '.github/workflows/build-dialectic.yml']
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: dialectic

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: dialectic/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icons
        run: python scripts/generate_icons.py

      - name: Build with PyInstaller
        run: pyinstaller dialectic.spec --noconfirm --clean

      - name: Create macOS DMG
        if: matrix.platform == 'macos'
        run: |
          brew install create-dmg || true
          bash scripts/build_macos.sh

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Surface NSIS on PATH for subsequent steps.
          $nsisDir = "C:\Program Files (x86)\NSIS"
          if (-not (Test-Path "$nsisDir\makensis.exe")) {
            $nsisDir = "C:\Program Files\NSIS"
          }
          echo "$nsisDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$nsisDir\makensis.exe" /VERSION

      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if (Test-Path scripts/build_windows.ps1) {
            pwsh -File scripts/build_windows.ps1
          } else {
            Write-Host "No Windows build script; skipping installer step."
          }

      - name: Code sign (macOS)
        if: matrix.platform == 'macos' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: bash ../scripts/codesign_macos.sh dist/Dialectic.app "$APPLE_SIGNING_IDENTITY"

      - name: Notarize (macOS)
        if: matrix.platform == 'macos' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        shell: bash
        run: |
          DMG=$(ls dist/Dialectic*.dmg | head -n1)
          bash ../scripts/notarize_macos.sh "$DMG" "$APPLE_ID" "$APPLE_TEAM_ID" "$APPLE_APP_PASSWORD"

      - name: Code sign (Windows)
        if: matrix.platform == 'windows' && env.WIN_CERT_PFX_BASE64 != ''
        env:
          WIN_CERT_PFX_BASE64: ${{ secrets.WIN_CERT_PFX_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:WIN_CERT_PFX_BASE64)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", $certBytes)
          ..\scripts\codesign_windows.ps1 -Target dist\Dialectic -CertPath "$env:RUNNER_TEMP\cert.pfx" -CertPassword $env:WIN_CERT_PASSWORD

      # Upload only the final installers — not the raw PyInstaller bundle
      # (dist/Dialectic/) which is already inside the DMG/EXE. Uploading the
      # bundle would add minutes of artifact upload + download time for zero
      # downstream benefit (the publish job only reads the .dmg / .exe).
      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: dialectic-macos
          path: dialectic/dist/*.dmg
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: dialectic-windows
          path: dialectic/dist/Dialectic-Setup.exe
          retention-days: 30
          if-no-files-found: warn
